name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            exe: omnifetch
            archive_ext: zip
          - name: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            exe: omnifetch
            archive_ext: zip
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            exe: omnifetch.exe
            archive_ext: zip
          - name: windows-arm64
            runner: windows-latest
            goos: windows
            goarch: arm64
            exe: omnifetch.exe
            archive_ext: zip
          - name: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            exe: omnifetch
            archive_ext: zip
          - name: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            exe: omnifetch
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          printf '%s\n' "$version" > VERSION

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GOFLAGS: -trimpath
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X omnifetch/internal/version.Current=v${VERSION}" -o "dist/${{ matrix.exe }}" ./cmd/omnifetch

      - name: Package release artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          artifact="omnifetch-v${VERSION}-${{ matrix.name }}.${{ matrix.archive_ext }}"
          rm -f "$artifact" checksums.txt
          cp README.md dist/
          cp LICENSE dist/
          mkdir -p dist/assets
          cp assets/banner.txt dist/assets/
          (cd dist && zip -r "../$artifact" "${{ matrix.exe }}" README.md LICENSE assets/banner.txt)
          sha256sum "$artifact" > checksums.txt

      - name: Package release artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "omnifetch-v$env:VERSION-${{ matrix.name }}.${{ matrix.archive_ext }}"
          Remove-Item $artifact, checksums.txt -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force dist/assets | Out-Null
          Copy-Item README.md, LICENSE -Destination dist -Force
          Copy-Item assets/banner.txt dist/assets -Force
          Compress-Archive -Path dist/${{ matrix.exe }}, dist/README.md, dist/LICENSE, dist/assets/banner.txt -DestinationPath $artifact
          $hash = (Get-FileHash $artifact -Algorithm SHA256).Hash.ToLower()
          "$hash  $artifact" | Out-File -Encoding ascii checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            omnifetch-v${{ env.VERSION }}-${{ matrix.name }}.${{ matrix.archive_ext }}
            checksums.txt

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        shell: bash
        run: |
          cat artifacts/**/checksums.txt > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            checksums.txt