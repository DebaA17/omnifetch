name: omnifetch
base: core22
version: git
summary: OmniFetch public-content downloader
description: |
  OmniFetch is a CLI downloader for public files, public articles, and media
  sources supported by yt-dlp.
grade: stable
confinement: strict

apps:
  omnifetch:
    command: bin/omnifetch
    plugs:
      - network
      - home
      - removable-media

parts:
  omnifetch:
    plugin: go
    source: .
    build-snaps:
      - go/1.25/stable
    override-build: |
      go build -trimpath -ldflags "-s -w -X omnifetch/internal/version.Current=${SNAPCRAFT_PROJECT_VERSION}" -o "$CRAFT_PART_INSTALL/bin/omnifetch" ./cmd/omnifetch
    stage-packages:
      - ca-certificates