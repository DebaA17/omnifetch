name: omnifetch
base: core22
adopt-info: omnifetch
version: 0+unknown
summary: OmniFetch public-content downloader
description: |
  OmniFetch is a CLI downloader for public files, public articles, and media
  sources supported by yt-dlp.
grade: stable
confinement: strict

apps:
  omnifetch:
    command: bin/omnifetch
    plugs:
      - network
      - home
      - removable-media

parts:
  omnifetch:
    plugin: go
    source: .
    build-snaps:
      - go/1.25/stable
    override-pull: |
      craftctl default
      if [ -f "${CRAFT_PROJECT_DIR:-.}/VERSION" ]; then
        craftctl set version="$(cat "${CRAFT_PROJECT_DIR:-.}/VERSION")"
      elif [ -f "${CRAFT_PART_SRC}/VERSION" ]; then
        craftctl set version="$(cat "${CRAFT_PART_SRC}/VERSION")"
      fi
    override-build: |
      VERSION=$(sed -n 's/^var Current = "\(v[^\"]*\)"/\1/p' internal/version/version.go | head -n1)
      go build -trimpath -ldflags "-s -w -X omnifetch/internal/version.Current=${VERSION}" -o "$CRAFT_PART_INSTALL/bin/omnifetch" ./cmd/omnifetch
    stage-packages:
      - ca-certificates